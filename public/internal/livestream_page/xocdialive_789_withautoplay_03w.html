    <style>
        html,
        body {
            color: #1c0d33;
            background-color: #1c0d33;
            width: 100vw;
            height: 100vh;
            margin: 0;
            -webkit-user-select: none;
            -webkit-touch-callout: none;
            -khtml-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            -o-user-select: none;
            user-select: none;
        }

        #spinner {
            margin: 0 auto;
            width: 60px;
            height: 50px;
            text-align: center;
            font-size: 10px;
            position: absolute;
            top: 30vw;
            left: 50%;
            -webkit-transform: translateY(-50%) translateX(-50%);
        }

        #baotri {
            position: absolute;
            z-index: 3;
            left: 0vw;
            top: 0vh;
            width: 100vw;
            height: 100vh;
            background-color: white;
            border: none;
            display: none;
        }

        .gear {
            position: absolute;
            width: 30px;
            height: 30px;
            animation: spin 2s infinite;
        }

        .gear:nth-child(1) {
            top: -7px;
            left: -3px;
        }

        .gear:nth-child(2) {
            top: 22px;
            left: -10px;
            width: 40px;
            height: 40px;
        }

        .gear:nth-child(3) {
            top: -3px;
            left: 25px;
            width: 50px;
            height: 50px;
            animation: spin-reverse 2s infinite;
        }

        .number7 {
            position: absolute;
            top: 50%;
            left: 50%;
            margin-top: -27.0px;
            margin-left: -28.0px;
            width: 20px;
            height: 20px;
        }

        .number8 {
            position: absolute;
            top: 50%;
            left: 50%;
            margin-top: 1.0px;
            margin-left: -35.0px;
            width: 30px;
            height: 30px;
        }

        .number9 {
            position: absolute;
            top: 50%;
            left: 50%;
            margin-top: -24.0px;
            margin-left: 0.0px;
            width: 40px;
            height: 40px;
        }

        @keyframes spin {
            50% {
                transform: rotate(360deg);
            }
        }

        @keyframes spin-reverse {
            50% {
                transform: rotate(-360deg);
            }
        }

        @keyframes zoom-in-zoom-out {
            0% {
                transform: scale(1, 1);
            }

            50% {
                transform: scale(1.1, 1.1);
            }

            100% {
                transform: scale(1, 1);
            }
        }

        @keyframes fade-in {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        @keyframes fade-out {
            from {
                opacity: 1;
            }
            to {
                opacity: 0;
            }
        }

        .bgColor {
            background-color: #1c0d33;
            width: 110vmax;
            height: 110vmax;
            position: absolute;
            top: 50%;
            left: 50%;
            z-index: -1;
            transform: translate(-50%, -50%);
        }

        .blackScreen {
            background-color: #000000b3;
            width: 110vmax;
            height: 110vmax;
            position: absolute;
            display: none;
            top: 50%;
            left: 50%;
            z-index: 1000;
            transform: translate(-50%, -50%);

        .full-height {
            height: 120vh;

    <script>
        window.ontouchstart = function (event) {
            if (event.touches.length > 1) {
                event.preventDefault();
            }
        }
        document.addEventListener('touchmove', e => {
            if (e.touches.length > 1) {
                e.preventDefault();
            }
        }, { passive: false })
        var messageToGameScheme = "messagetogame://";
        window.addEventListener('message', function (e) {
            var text = e.data;
            if (typeof text !== 'string') {
                return;
            }
            if (!messageToGameScheme) {
                return;
            }
            if (text.indexOf(messageToGameScheme) === 0) {
                const func = text.substring(messageToGameScheme.length);
                try {
                    eval(func);
                } catch (e) {
                    console.log(e);
                }
            }
        });
        function showWhenVideoPlay() {
            // document.getElementById('bgdlname').style.display = 'block';
            // document.getElementById('bgCountDown').style.display = 'block';
            // document.getElementById('soundIcon').style.display = 'block';
        }

        function soundOn() {
            player.unmute();
            player.setVolume(1);
        }

        function soundOff() {
            player.mute();
            player.setVolume(0);
        }
    </script>
